<div class="panel settings-panel">
  <div class="panel-header">
    <div>
      <h3>설정</h3>
      <p>대상 월과 팀 정보를 관리합니다.</p>
    </div>
    <button class="primary-button" id="saveSettings">설정 저장</button>
  </div>
  <div class="settings-grid">
    <label>대상 월<input id="settingTargetMonth" type="month"></label>
    <label>제출 마감일<input id="settingDeadline" type="date"></label>
    <label>관리자 이메일<input id="settingAdminEmail" type="email"></label>
    <label>관리자 이름<input id="settingAdminName" type="text"></label>
    <label>팀 이름<input id="settingTeamName" type="text"></label>
    <label>웹 앱 URL<input id="settingWebAppUrl" type="url"></label>
    <label class="settings-full">리마인더 메시지<textarea id="settingReminderMessage" rows="5" placeholder="미제출자에게 보낼 메시지를 입력해 주세요."></textarea></label>
  </div>
</div>
