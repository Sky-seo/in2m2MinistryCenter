<div class="panel">
  <div class="panel-header">
    <div>
      <h3>월별 제출 현황</h3>
      <p>포지션별 가능한 멤버를 확인하고 라인업을 선택합니다.</p>
    </div>
    <div class="button-row">
      <button class="secondary-button" id="generateLineup">라인업 생성</button>
      <button class="primary-button" id="sendAvailabilityReminders">리마인더 보내기</button>
    </div>
  </div>
  <div class="toolbar">
    <select id="availabilityPositionFilter"><option value="">모든 포지션</option></select>
    <!-- Submission status filtering is intentionally disabled.
    <select id="availabilityStatusFilter">
      <option value="">전체 상태</option>
      <option value="Submitted">제출 완료</option>
      <option value="Not Submitted">미제출</option>
    </select>
    -->
  </div>
  <div class="table-wrap">
    <table class="availability-matrix">
      <thead id="availabilityHead"></thead>
      <tbody id="availabilityRows"></tbody>
    </table>
  </div>
</div>
