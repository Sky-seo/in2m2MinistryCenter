<script>
  const state = {
    data: null,
    selectedSundays: new Set(),
    currentView: 'dashboard',
    modalMode: null,
    editingId: null,
    availabilityRequestId: 0,
    hasEditedAvailability: false,
    hasPendingAssignmentChanges: false,
    currentTeam: 'production',
    adminTeam: 'production',
    adminCache: {},
    adminPendingChanges: {},
    pendingDelete: null,
    reminderSelectedMemberIds: new Set(),
  };

  const server = {
    call(method, ...args) {
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler((error) => reject(error))
          [method](...args);
      });
    },
  };

  function bootPublicApp() {
    bindPublicEvents();
    renderPublicLoading();
    loadPublicData().then(renderPublicPage).catch(showPublicError);
  }

  function bootAdminApp() {
    bindAdminEvents();
    state.data = state.data || {};
    renderAdminShellLoading();
    loadAdminStatusData().catch((error) => showToast(error.message || String(error)));
    loadAdminAssignmentsData().catch((error) => showToast(error.message || String(error)));
    setTimeout(() => {
      loadAdminSecondaryData().then(renderAdminSecondary).catch((error) => showToast(error.message || String(error)));
    }, 100);
  }

  function loadData() {
    return server.call('getAppData').then((data) => {
      state.data = data;
      return data;
    });
  }

  function loadAdminPrimaryData() {
    const requestedTeam = state.adminTeam;
    return server.call('getAdminPrimaryData', requestedTeam).then((data) => {
      if (requestedTeam !== state.adminTeam) return data;
      state.data = data;
      cacheAdminData();
      return data;
    });
  }

  function loadAdminStatusData() {
    const requestedTeam = state.adminTeam;
    return server.call('getAdminStatusData', requestedTeam).then((data) => {
      if (requestedTeam !== state.adminTeam) return data;
      state.data = Object.assign({}, state.data, data);
      cacheAdminData();
      renderDashboard();
      renderFilterOptions();
      renderAvailability();
      updateLineupButton();
      return data;
    });
  }

  function loadAdminAssignmentsData() {
    const requestedTeam = state.adminTeam;
    return server.call('getAdminAssignmentsData', state.data && state.data.targetMonth, requestedTeam).then((data) => {
      if (requestedTeam !== state.adminTeam) return data;
      state.data = Object.assign({}, state.data, data);
      cacheAdminData();
      renderAssignments();
      renderAvailability();
      updateLineupButton();
      return data;
    });
  }

  function loadAdminSecondaryData() {
    const requestedTeam = state.adminTeam;
    return server.call('getAdminSecondaryData', requestedTeam).then((data) => {
      if (requestedTeam !== state.adminTeam) return data;
      state.data = Object.assign({}, state.data, data);
      cacheAdminData();
      return data;
    });
  }

  function loadPublicData() {
    return server.call('getPublicData', state.currentTeam).then((data) => {
      state.data = data;
      return data;
    });
  }

  function renderPublicPage() {
    const data = state.data;
    renderTeamTabs();
    document.getElementById('targetMonthLabel').textContent = formatMonth(data.targetMonth);
    const select = document.getElementById('memberSelect');
    select.innerHTML = '<option value="">이름을 선택해 주세요</option>' + data.activeMembers
      .map((member) => `<option value="${escapeHtml(member.Member_ID)}">${escapeHtml(member.Name)}</option>`)
      .join('');
    select.disabled = false;
    document.getElementById('submitAvailability').disabled = false;
    renderSundayCards();
  }

  function renderPublicLoading() {
    document.getElementById('targetMonthLabel').textContent = '불러오는 중';
    document.getElementById('memberSelect').disabled = true;
    document.getElementById('submitAvailability').disabled = true;
  }

  function renderTeamTabs() {
    document.querySelectorAll('.team-tab').forEach((button) => {
      button.classList.toggle('active', button.dataset.team === state.currentTeam);
    });
  }

  function switchPublicTeam(team) {
    if (!team || team === state.currentTeam) return;
    state.currentTeam = team;
    state.data = null;
    state.selectedSundays = new Set();
    state.hasEditedAvailability = false;
    document.getElementById('memberPosition').classList.add('hidden');
    document.getElementById('memberPosition').textContent = '';
    document.getElementById('notes').value = '';
    renderTeamTabs();
    renderPublicLoading();
    loadPublicData().then(renderPublicPage).catch(showPublicError);
  }

  function bindPublicEvents() {
    document.querySelectorAll('.team-tab').forEach((button) => {
      button.addEventListener('click', () => switchPublicTeam(button.dataset.team));
    });
    document.getElementById('memberSelect').addEventListener('change', handleMemberSelect);
    document.getElementById('submitAvailability').addEventListener('click', handleAvailabilitySubmit);
    document.getElementById('submitAgain').addEventListener('click', () => {
      document.getElementById('successCard').classList.add('hidden');
      document.getElementById('submissionCard').classList.remove('hidden');
    });
  }

  function handleMemberSelect(event) {
    const member = state.data.activeMembers.find((item) => item.Member_ID === event.target.value);
    const pill = document.getElementById('memberPosition');
    const requestId = ++state.availabilityRequestId;
    state.selectedSundays = new Set();
    state.hasEditedAvailability = false;
    renderSundayCards();
    if (!member) {
      pill.classList.add('hidden');
      pill.textContent = '';
      return;
    }
    pill.textContent = member.Position;
    pill.classList.remove('hidden');
    server.call('getMemberAvailability', state.data.targetMonth, member.Member_ID, state.currentTeam)
      .then((existing) => {
        if (requestId !== state.availabilityRequestId) return;
        if (state.hasEditedAvailability) return;
        state.selectedSundays = existing ? parseAvailableSundays(existing.Available_Sundays) : new Set();
        renderSundayCards();
      })
      .catch(showPublicError);
  }

  function renderSundayCards() {
    const grid = document.getElementById('sundayGrid');
    if (!state.data) return;
    grid.innerHTML = state.data.sundays.map((date) => {
      const selected = state.selectedSundays.has(date);
      return `
        <button type="button" class="date-card ${selected ? 'selected' : ''}" data-date="${date}">
          <strong>${Number(date.slice(8, 10))}일 ${selected ? '✓' : ''}</strong>
          <span>${date}</span>
        </button>
      `;
    }).join('');
    grid.querySelectorAll('.date-card').forEach((button) => {
      button.addEventListener('click', () => {
        const date = button.dataset.date;
        state.hasEditedAvailability = true;
        if (state.selectedSundays.has(date)) state.selectedSundays.delete(date);
        else state.selectedSundays.add(date);
        renderSundayCards();
      });
    });
  }

  function handleAvailabilitySubmit() {
    const message = document.getElementById('formMessage');
    const memberId = document.getElementById('memberSelect').value;
    if (!memberId) {
      message.textContent = '이름을 선택해 주세요.';
      return;
    }
    const button = document.getElementById('submitAvailability');
    button.disabled = true;
    button.textContent = '저장 중...';
    message.textContent = '';
    server.call('submitAvailability', {
      Team: state.currentTeam,
      Month: state.data.targetMonth,
      Member_ID: memberId,
      Available_Sundays: Array.from(state.selectedSundays),
      Notes: document.getElementById('notes').value,
    }).then(() => {
      document.getElementById('submissionCard').classList.add('hidden');
      document.getElementById('successCard').classList.remove('hidden');
    }).catch(showPublicError).finally(() => {
      button.disabled = false;
      button.textContent = '제출하기';
    });
  }

  function showPublicError(error) {
    document.getElementById('formMessage').textContent = error.message || String(error);
  }

  function bindAdminEvents() {
    document.querySelectorAll('.team-header').forEach((button) => {
      button.addEventListener('click', () => switchAdminTeam(button.closest('.team-section').dataset.team));
    });
    document.querySelectorAll('.nav-item').forEach((button) => {
      button.addEventListener('click', () => {
        const team = button.closest('.team-section').dataset.team;
        if (team !== state.adminTeam) switchAdminTeam(team, button.dataset.view);
        else switchView(button.dataset.view);
      });
    });
    bindIfPresent('refreshData', 'click', () => reloadAdminTeam(true));
    bindIfPresent('addMember', 'click', () => openMemberModal());
    bindIfPresent('addPosition', 'click', () => openPositionModal());
    bindIfPresent('memberSearch', 'input', renderMembers);
    bindIfPresent('memberPositionFilter', 'change', renderMembers);
    bindIfPresent('memberActiveFilter', 'change', renderMembers);
    bindIfPresent('availabilityPositionFilter', 'change', renderAvailability);
    bindIfPresent('availabilityStatusFilter', 'change', renderAvailability);
    bindIfPresent('sendDashboardReminders', 'click', openReminderModal);
    bindIfPresent('sendAvailabilityReminders', 'click', openReminderModal);
    bindIfPresent('generateLineup', 'click', saveGeneratedLineup);
    bindIfPresent('saveSettings', 'click', (event) => saveSettings(event.currentTarget));
    bindIfPresent('closeModal', 'click', closeModal);
    bindIfPresent('cancelModal', 'click', closeModal);
    bindIfPresent('saveModal', 'click', saveModal);
    bindIfPresent('cancelDelete', 'click', closeDeleteModal);
    bindIfPresent('confirmDelete', 'click', confirmDelete);
    bindIfPresent('closeReminderModal', 'click', closeReminderModal);
    bindIfPresent('cancelReminder', 'click', closeReminderModal);
    bindIfPresent('confirmReminder', 'click', confirmReminder);
    bindIfPresent('toggleAllReminders', 'click', toggleAllReminderMembers);
  }

  function bindIfPresent(id, eventName, handler) {
    const element = document.getElementById(id);
    if (element) element.addEventListener(eventName, handler);
  }

  function switchView(view) {
    state.currentView = view;
    document.querySelectorAll('.nav-item').forEach((button) => {
      const team = button.closest('.team-section').dataset.team;
      button.classList.toggle('active', team === state.adminTeam && button.dataset.view === view);
    });
    document.querySelectorAll('.admin-view').forEach((section) => section.classList.toggle('active', section.id === `view-${view}`));
    document.getElementById('adminPageTitle').textContent = view.charAt(0).toUpperCase() + view.slice(1);
  }

  function switchAdminTeam(team, view) {
    if (!team) return;
    if (view) state.currentView = view;
    if (team === state.adminTeam) {
      switchView(state.currentView);
      renderAdminTeamLabel();
      return;
    }
    cacheAdminData();
    state.adminPendingChanges[state.adminTeam] = state.hasPendingAssignmentChanges;
    state.adminTeam = team;
    state.hasPendingAssignmentChanges = !!state.adminPendingChanges[team];
    if (hasAdminCache(team)) {
      state.data = cloneAdminData(state.adminCache[team]);
      renderAdminTeamLabel();
      renderAdmin();
      return;
    }
    state.data = {};
    renderAdminShellLoading();
    reloadAdminTeam();
  }

  function reloadAdminTeam(force) {
    if (!force && hasAdminCache(state.adminTeam)) {
      state.data = cloneAdminData(state.adminCache[state.adminTeam]);
      state.hasPendingAssignmentChanges = !!state.adminPendingChanges[state.adminTeam];
      renderAdminTeamLabel();
      renderAdmin();
      return Promise.resolve(state.data);
    }
    if (force) {
      state.hasPendingAssignmentChanges = false;
      state.adminPendingChanges[state.adminTeam] = false;
    }
    renderAdminTeamLabel();
    loadAdminStatusData().catch((error) => showToast(error.message || String(error)));
    loadAdminAssignmentsData().catch((error) => showToast(error.message || String(error)));
    return loadAdminSecondaryData().then(renderAdminSecondary).catch((error) => showToast(error.message || String(error)));
  }

  function cacheAdminData() {
    if (!state.data) return;
    state.adminCache[state.adminTeam] = cloneAdminData(state.data);
  }

  function hasAdminCache(team) {
    const data = state.adminCache[team];
    return !!(data && data.settings && data.members && data.positions && data.status && data.assignments);
  }

  function cloneAdminData(data) {
    return JSON.parse(JSON.stringify(data || {}));
  }

  function renderAdminTeamLabel() {
    document.querySelectorAll('.team-section').forEach((section) => {
      const active = section.dataset.team === state.adminTeam;
      section.classList.toggle('active', active);
      const chevron = section.querySelector('.team-chevron');
      if (chevron) chevron.textContent = active ? '⌃' : '⌄';
    });
    switchView(state.currentView);
  }

  function renderAdmin() {
    renderAdminPrimary();
    renderAdminSecondary();
  }

  function renderAdminShellLoading() {
    renderAdminTeamLabel();
    document.getElementById('dashboardStatusRows').innerHTML = '<tr><td colspan="3">Dashboard 불러오는 중...</td></tr>';
    document.getElementById('availabilityHead').innerHTML = '';
    document.getElementById('availabilityRows').innerHTML = '<tr><td>Availability 불러오는 중...</td></tr>';
    document.getElementById('assignmentsHead').innerHTML = '';
    document.getElementById('assignmentsRows').innerHTML = '<tr><td>Assignments 불러오는 중...</td></tr>';
  }

  function renderAdminPrimary() {
    renderDashboard();
    renderFilterOptions();
    renderAvailability();
    renderAssignments();
    updateLineupButton();
  }

  function renderAdminSecondary() {
    renderMembers();
    renderPositions();
    renderSettings();
  }

  function renderDashboard() {
    const members = state.data.members || [];
    const activeMembers = state.data.activeMembers || members.filter((member) => member.Active === 'Yes');
    const inactiveMembers = members.filter((member) => member.Active === 'No');
    document.getElementById('totalMembers').textContent = members.length;
    document.getElementById('submittedCount').textContent = activeMembers.length;
    document.getElementById('notSubmittedCount').textContent = inactiveMembers.length;
    document.getElementById('targetMonthSummary').textContent = formatMonthRange(state.data.targetMonth);
    document.getElementById('dashboardStatusRows').innerHTML = memberAvailabilityRowsHtml(state.data.status || []);
  }

  function renderFilterOptions() {
    const options = '<option value="">모든 포지션</option>' + (state.data.positions || [])
      .map((position) => `<option value="${escapeHtml(position.Position_Name)}">${escapeHtml(position.Position_Name)}</option>`)
      .join('');
    document.getElementById('memberPositionFilter').innerHTML = options;
    document.getElementById('availabilityPositionFilter').innerHTML = options;
  }

  function renderMembers() {
    const search = document.getElementById('memberSearch').value.trim().toLowerCase();
    const position = document.getElementById('memberPositionFilter').value;
    const active = document.getElementById('memberActiveFilter').value;
    const rows = (state.data.members || []).filter((member) => {
      if (search && !String(member.Name).toLowerCase().includes(search)) return false;
      if (position && !hasPosition(member.Position, position)) return false;
      if (active && member.Active !== active) return false;
      return true;
    });
    document.getElementById('membersRows').innerHTML = rows.map((member) => `
      <tr>
        <td><strong>${escapeHtml(member.Name)}</strong></td>
        <td>${escapeHtml(member.Email)}</td>
        <td>${escapeHtml(member.Position)}</td>
        <td>${activeBadge(member.Active)}</td>
        <td>${escapeHtml(formatDateOnly(member.Join_Date))}</td>
        <td>
          <div class="row-actions">
            <button class="secondary-button" onclick="openMemberModal('${member.Member_ID}')">Edit</button>
            <button class="ghost-button" onclick="toggleMember('${member.Member_ID}', '${member.Active}', this)">${member.Active === 'Yes' ? 'Deactivate' : 'Reactivate'}</button>
            <button class="danger-button" onclick="removeMember('${member.Member_ID}')">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function renderPositions() {
    document.getElementById('positionsRows').innerHTML = (state.data.positions || []).map((position) => `
      <tr>
        <td><strong>${escapeHtml(position.Position_Name)}</strong></td>
        <td>${escapeHtml(position.Required_Per_Sunday)}</td>
        <td>${escapeHtml(position.Sort_Order)}</td>
        <td>${activeBadge(position.Active)}</td>
        <td>
          <div class="row-actions">
            <button class="secondary-button" onclick="openPositionModal('${position.Position_ID}')">Edit</button>
            <button class="ghost-button" onclick="togglePosition('${position.Position_ID}', '${position.Active}', this)">${position.Active === 'Yes' ? 'Deactivate' : 'Reactivate'}</button>
            <button class="danger-button" onclick="removePosition('${position.Position_ID}')">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function renderAvailability() {
    const position = document.getElementById('availabilityPositionFilter').value;
    const statusFilter = document.getElementById('availabilityStatusFilter');
    const status = statusFilter ? statusFilter.value : '';
    const rows = (state.data.availabilityRows || state.data.status || []).filter((row) => {
      if (position && !hasPosition(row.Position, position)) return false;
      if (status && row.Status !== status) return false;
      return true;
    });
    const sundays = state.data.sundays;
    document.getElementById('availabilityHead').innerHTML = `
      <tr>
        ${sundays.map((date) => `<th class="week-column">${formatShortDate(date)}</th>`).join('')}
      </tr>
    `;

    const positionNames = (state.data.positions || [])
      .map((item) => item.Position_Name)
      .filter((name) => !position || name === position);
    const extraPositionNames = rows
      .flatMap((row) => splitPositions(row.Position))
      .filter((name) => name && !positionNames.includes(name));
    const groupedPositions = positionNames.concat(extraPositionNames);

    document.getElementById('availabilityRows').innerHTML = `
      <tr>
        ${sundays.map((date) => availabilityWeekCellHtml(date, groupedPositions, rows)).join('')}
      </tr>
    `;
  }

  function availabilityWeekCellHtml(date, positionNames, rows) {
    return `
      <td class="availability-week-cell">
        ${positionNames.map((positionName) => {
          const names = rows
            .filter((row) => hasPosition(row.Position, positionName))
            .filter((row) => parseAvailableSundays(row.Available_Sundays).has(date))
            .map((row) => row.Name);
          return `
            <div class="availability-position-block">
              <strong>${escapeHtml(positionName)}</strong>
              ${names.length
                ? names.map((name) => availabilityNameButtonHtml(date, positionName, name)).join('')
                : '<em>-</em>'}
            </div>
          `;
        }).join('')}
      </td>
    `;
  }

  function availabilityNameButtonHtml(date, positionName, name) {
    const selected = isAssigned(date, positionName, name);
    return `
      <button
        type="button"
        class="availability-name ${selected ? 'selected' : ''}"
        data-date="${escapeAttr(date)}"
        data-position="${escapeAttr(positionName)}"
        data-name="${escapeAttr(name)}"
        onclick="toggleAvailabilityAssignment(this)"
      >
        <span>${escapeHtml(name)}</span>
        ${selected ? '<b aria-hidden="true">×</b>' : ''}
      </button>
    `;
  }

  function memberAvailabilityRowsHtml(rows) {
    return rows.map((row) => `
      <tr>
        <td><strong>${escapeHtml(row.Name)}</strong></td>
        <td>${escapeHtml(row.Position)}</td>
        <td>${escapeHtml(formatDateListShort(row.Available_Sundays))}</td>
      </tr>
    `).join('');
  }

  function renderAssignments() {
    const positions = state.data.activePositions || [];
    document.getElementById('assignmentsHead').innerHTML = `
      <tr><th>Date</th>${positions.map((position) => `<th>${escapeHtml(position.Position_Name)}</th>`).join('')}</tr>
    `;
    document.getElementById('assignmentsRows').innerHTML = (state.data.assignments || []).map((row) => `
      <tr data-date="${escapeHtml(row.Date)}">
        <td>
          <button type="button" class="copy-date-button" onclick="copyAssignmentLineup('${escapeAttr(row.Date)}')">
            ${escapeHtml(formatShortDate(row.Date))}
          </button>
        </td>
        ${positions.map((position) => `
          <td>${assignmentNamesHtml(row[position.Position_Name])}</td>
        `).join('')}
      </tr>
    `).join('');
  }

  function assignmentNamesHtml(value) {
    const names = splitNames(value);
    return names.length
      ? names.map((name) => `<span class="assignment-name-pill">${escapeHtml(name)}</span>`).join('')
      : '<span class="assignment-empty">-</span>';
  }

  function copyAssignmentLineup(date) {
    const row = (state.data.assignments || []).find((item) => item.Date === date);
    if (!row) return;
    const lines = [
      `${formatShortDate(date)} 주일예배`,
      '[라인업]',
    ];
    (state.data.activePositions || []).forEach((position) => {
      const names = splitNames(row[position.Position_Name]);
      if (names.length) lines.push(`${position.Position_Name} ${names.join(' ')}`);
    });
    copyText(lines.join('\n'))
      .then(() => showToast('라인업을 복사했습니다.'))
      .catch((error) => showToast(error.message || String(error)));
  }

  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.setAttribute('readonly', '');
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    const copied = document.execCommand('copy');
    document.body.removeChild(textarea);
    return copied ? Promise.resolve() : Promise.reject(new Error('복사에 실패했습니다.'));
  }

  function renderSettings() {
    const settings = state.data.settings;
    document.getElementById('settingTargetMonth').value = settings.Current_Target_Month || state.data.targetMonth;
    document.getElementById('settingDeadline').value = settings.Submission_Deadline || '';
    document.getElementById('settingAdminEmail').value = settings.Admin_Email || '';
    document.getElementById('settingAdminName').value = settings.Admin_Name || settings.Church_Name || '';
    document.getElementById('settingTeamName').value = settings.Team_Name || '';
    document.getElementById('settingWebAppUrl').value = settings.Web_App_URL || state.data.appUrl || '';
    document.getElementById('settingReminderMessage').value = settings.Reminder_Message || '';
  }

  function openMemberModal(memberId) {
    const member = state.data.members.find((item) => item.Member_ID === memberId) || {};
    const selectedPositions = splitPositions(member.Position);
    state.modalMode = 'member';
    state.editingId = memberId || null;
    document.getElementById('modalTitle').textContent = memberId ? '멤버 수정' : '새 멤버 추가';
    document.getElementById('modalForm').innerHTML = `
      <label>이름<input name="Name" value="${escapeAttr(member.Name || '')}" required></label>
      <label>이메일<input name="Email" type="email" value="${escapeAttr(member.Email || '')}"></label>
      <label>포지션<div class="checkbox-list">${state.data.positions.map((position) => `
        <label class="checkbox-option">
          <input type="checkbox" name="Position" value="${escapeAttr(position.Position_Name)}" ${selectedPositions.includes(position.Position_Name) ? 'checked' : ''}>
          <span>${escapeHtml(position.Position_Name)}</span>
        </label>
      `).join('')}</div></label>
      <label>상태<select name="Active"><option value="Yes" ${member.Active !== 'No' ? 'selected' : ''}>활성</option><option value="No" ${member.Active === 'No' ? 'selected' : ''}>비활성</option></select></label>
      <label>메모<textarea name="Notes" rows="3">${escapeHtml(member.Notes || '')}</textarea></label>
    `;
    openModal();
  }

  function openPositionModal(positionId) {
    const position = state.data.positions.find((item) => item.Position_ID === positionId) || {};
    state.modalMode = 'position';
    state.editingId = positionId || null;
    document.getElementById('modalTitle').textContent = positionId ? '포지션 수정' : '새 포지션 추가';
    document.getElementById('modalForm').innerHTML = `
      <label>포지션 이름<input name="Position_Name" value="${escapeAttr(position.Position_Name || '')}" required></label>
      <label>주일별 필요 인원<input name="Required_Per_Sunday" type="number" min="1" value="${escapeAttr(position.Required_Per_Sunday || 1)}"></label>
      <label>정렬 순서<input name="Sort_Order" type="number" min="1" value="${escapeAttr(position.Sort_Order || state.data.positions.length + 1)}"></label>
      <label>상태<select name="Active"><option value="Yes" ${position.Active !== 'No' ? 'selected' : ''}>활성</option><option value="No" ${position.Active === 'No' ? 'selected' : ''}>비활성</option></select></label>
    `;
    openModal();
  }

  function openModal() {
    setModalSaving(false);
    document.getElementById('modalBackdrop').classList.remove('hidden');
  }

  function closeModal() {
    setModalSaving(false);
    document.getElementById('modalBackdrop').classList.add('hidden');
    state.modalMode = null;
    state.editingId = null;
  }

  function saveModal() {
    const formData = new FormData(document.getElementById('modalForm'));
    const values = Object.fromEntries(formData.entries());
    if (state.modalMode === 'member') values.Position = formData.getAll('Position').join(', ');
    setModalSaving(true);
    values.Team = state.adminTeam;
    const method = state.modalMode === 'member' ? 'saveMember' : 'savePosition';
    const idKey = state.modalMode === 'member' ? 'Member_ID' : 'Position_ID';
    if (state.editingId) values[idKey] = state.editingId;
    server.call(method, values)
      .then((data) => {
        state.data = data;
        cacheAdminData();
        closeModal();
        renderAdmin();
        showToast('저장되었습니다.');
      })
      .catch((error) => {
        setModalSaving(false);
        showToast(error.message || String(error));
      });
  }

  function setModalSaving(isSaving) {
    const saveButton = document.getElementById('saveModal');
    const cancelButton = document.getElementById('cancelModal');
    const closeButton = document.getElementById('closeModal');
    const form = document.getElementById('modalForm');
    if (saveButton) {
      saveButton.disabled = isSaving;
      saveButton.textContent = isSaving ? '저장 중...' : '저장';
    }
    if (cancelButton) cancelButton.disabled = isSaving;
    if (closeButton) closeButton.disabled = isSaving;
    if (form) {
      form.querySelectorAll('input, select, textarea').forEach((field) => {
        field.disabled = isSaving;
      });
    }
  }

  function toggleMember(memberId, active, button) {
    setInlineActionLoading(button, active === 'Yes' ? '비활성화 중...' : '활성화 중...');
    server.call('setMemberActive', memberId, active !== 'Yes', state.adminTeam)
      .then(updateAfterAction)
      .catch((error) => {
        setInlineActionLoading(button, null);
        showToast(error.message || String(error));
      });
  }

  function togglePosition(positionId, active, button) {
    setInlineActionLoading(button, active === 'Yes' ? '비활성화 중...' : '활성화 중...');
    server.call('setPositionActive', positionId, active !== 'Yes', state.adminTeam)
      .then(updateAfterAction)
      .catch((error) => {
        setInlineActionLoading(button, null);
        showToast(error.message || String(error));
      });
  }

  function setInlineActionLoading(button, label) {
    if (!button) return;
    if (label) {
      button.dataset.originalText = button.textContent;
      button.textContent = label;
      button.disabled = true;
      return;
    }
    button.textContent = button.dataset.originalText || button.textContent;
    button.disabled = false;
  }

  function removeMember(memberId) {
    const member = (state.data.members || []).find((item) => item.Member_ID === memberId);
    openDeleteModal({
      type: 'member',
      id: memberId,
      message: `${member && member.Name ? member.Name : '이 멤버'}를 삭제하면 멤버 목록에서 제거됩니다.`,
    });
  }

  function removePosition(positionId) {
    const position = (state.data.positions || []).find((item) => item.Position_ID === positionId);
    openDeleteModal({
      type: 'position',
      id: positionId,
      message: `${position && position.Position_Name ? position.Position_Name : '이 포지션'}을 삭제하면 목록에서 제거됩니다.`,
    });
  }

  function openDeleteModal(deleteRequest) {
    state.pendingDelete = deleteRequest;
    setDeleteSaving(false);
    document.getElementById('deleteModalMessage').textContent = deleteRequest.message;
    document.getElementById('deleteModalBackdrop').classList.remove('hidden');
  }

  function closeDeleteModal() {
    setDeleteSaving(false);
    document.getElementById('deleteModalBackdrop').classList.add('hidden');
    state.pendingDelete = null;
  }

  function confirmDelete() {
    if (!state.pendingDelete) return;
    const request = state.pendingDelete;
    const method = request.type === 'member' ? 'deleteMember' : 'deletePosition';
    setDeleteSaving(true);
    server.call(method, request.id, state.adminTeam)
      .then((data) => {
        closeDeleteModal();
        updateAfterAction(data);
      })
      .catch((error) => {
        setDeleteSaving(false);
        showToast(error.message || String(error));
      });
  }

  function setDeleteSaving(isSaving) {
    const confirmButton = document.getElementById('confirmDelete');
    const cancelButton = document.getElementById('cancelDelete');
    if (confirmButton) {
      confirmButton.disabled = isSaving;
      confirmButton.textContent = isSaving ? '삭제 중...' : '예';
    }
    if (cancelButton) cancelButton.disabled = isSaving;
  }

  function saveGeneratedLineup() {
    const button = document.getElementById('generateLineup');
    if (button) {
      button.disabled = true;
      button.textContent = '저장 중...';
    }
    server.call('saveAssignments', {
      Team: state.adminTeam,
      Month: state.data.targetMonth,
      Assignments: state.data.assignments,
    }).then((data) => {
      state.data = data;
      state.hasPendingAssignmentChanges = false;
      state.adminPendingChanges[state.adminTeam] = false;
      cacheAdminData();
      renderAdminPrimary();
      showToast('라인업이 저장되었습니다.');
    }).catch((error) => {
      showToast(error.message || String(error));
      updateLineupButton();
    });
  }

  function toggleAvailabilityAssignment(button) {
    const date = button.dataset.date;
    const position = button.dataset.position;
    const name = button.dataset.name;
    const row = ensureAssignmentRow(date);
    const names = splitNames(row[position]);
    const existingIndex = names.findIndex((item) => normalizeText(item) === normalizeText(name));
    if (existingIndex > -1) names.splice(existingIndex, 1);
    else names.push(name);
    row[position] = names.join(', ');
    state.hasPendingAssignmentChanges = true;
    state.adminPendingChanges[state.adminTeam] = true;
    cacheAdminData();
    renderAssignments();
    renderAvailability();
    updateLineupButton();
  }

  function ensureAssignmentRow(date) {
    let row = state.data.assignments.find((item) => item.Date === date);
    if (!row) {
      row = { Date: date };
      (state.data.activePositions || []).forEach((position) => row[position.Position_Name] = '');
      state.data.assignments.push(row);
      state.data.assignments.sort((a, b) => String(a.Date).localeCompare(String(b.Date)));
    }
    return row;
  }

  function isAssigned(date, position, name) {
    const row = state.data.assignments.find((item) => item.Date === date);
    if (!row) return false;
    return splitNames(row[position]).some((item) => normalizeText(item) === normalizeText(name));
  }

  function updateLineupButton() {
    const button = document.getElementById('generateLineup');
    if (!button) return;
    button.classList.toggle('hidden', !state.hasPendingAssignmentChanges);
    button.disabled = false;
    button.textContent = '라인업 생성';
  }

  function saveSettings(button) {
    setSettingsSaving(true, button);
    const settings = {
      Current_Target_Month: document.getElementById('settingTargetMonth').value,
      Submission_Deadline: document.getElementById('settingDeadline').value,
      Admin_Email: document.getElementById('settingAdminEmail').value,
      Admin_Name: document.getElementById('settingAdminName').value,
      Team_Name: document.getElementById('settingTeamName').value,
      Web_App_URL: document.getElementById('settingWebAppUrl').value,
      Reminder_Message: document.getElementById('settingReminderMessage').value,
    };
    server.call('saveSettings', settings, state.adminTeam)
      .then((data) => {
        setSettingsSaving(false, button);
        updateAfterAction(data);
      })
      .catch((error) => {
        setSettingsSaving(false, button);
        showToast(error.message || String(error));
      });
  }

  function setSettingsSaving(isSaving, button) {
    const saveButton = button || document.getElementById('saveSettings');
    if (saveButton) {
      saveButton.disabled = isSaving;
      saveButton.textContent = isSaving ? '저장 중...' : '설정 저장';
    }
    document.querySelectorAll('.settings-panel input, .settings-panel textarea').forEach((field) => {
      field.disabled = isSaving;
    });
  }

  function openReminderModal() {
    state.reminderSelectedMemberIds = new Set();
    renderReminderMembers();
    setReminderSending(false);
    document.getElementById('reminderModalBackdrop').classList.remove('hidden');
  }

  function closeReminderModal() {
    setReminderSending(false);
    document.getElementById('reminderModalBackdrop').classList.add('hidden');
    state.reminderSelectedMemberIds = new Set();
  }

  function renderReminderMembers() {
    const members = (state.data.activeMembers || []).filter((member) => member.Email);
    const list = document.getElementById('reminderMemberList');
    updateReminderSelectAllButton(members);
    if (!members.length) {
      list.innerHTML = '<p class="empty-message">이메일이 있는 활성 멤버가 없습니다.</p>';
      return;
    }
    list.innerHTML = members.map((member) => reminderMemberButtonHtml(member)).join('');
  }

  function reminderMemberButtonHtml(member) {
    const selected = state.reminderSelectedMemberIds.has(member.Member_ID);
    return `
      <button
        type="button"
        class="availability-name reminder-member ${selected ? 'selected' : ''}"
        data-member-id="${escapeAttr(member.Member_ID)}"
        onclick="toggleReminderMember(this)"
      >
        <span>${escapeHtml(member.Name)} <em>${escapeHtml(member.Position || '')}</em></span>
        ${selected ? '<b aria-hidden="true">×</b>' : ''}
      </button>
    `;
  }

  function toggleReminderMember(button) {
    const memberId = button.dataset.memberId;
    if (state.reminderSelectedMemberIds.has(memberId)) state.reminderSelectedMemberIds.delete(memberId);
    else state.reminderSelectedMemberIds.add(memberId);
    renderReminderMembers();
  }

  function toggleAllReminderMembers() {
    const members = (state.data.activeMembers || []).filter((member) => member.Email);
    const allSelected = members.length && members.every((member) => state.reminderSelectedMemberIds.has(member.Member_ID));
    state.reminderSelectedMemberIds = allSelected
      ? new Set()
      : new Set(members.map((member) => member.Member_ID));
    renderReminderMembers();
  }

  function updateReminderSelectAllButton(members) {
    const button = document.getElementById('toggleAllReminders');
    if (!button) return;
    const allSelected = members.length && members.every((member) => state.reminderSelectedMemberIds.has(member.Member_ID));
    button.textContent = allSelected ? '전체해제' : '전체선택';
    button.disabled = !members.length;
  }

  function confirmReminder() {
    const memberIds = Array.from(state.reminderSelectedMemberIds);
    if (!memberIds.length) {
      showToast('리마인더를 보낼 멤버를 선택해 주세요.');
      return;
    }
    setReminderSending(true);
    server.call('sendReminderEmails', state.data.targetMonth, state.adminTeam, memberIds).then((result) => {
      closeReminderModal();
      showToast(`리마인더 ${result.sent}건을 발송했습니다.`);
    }).catch((error) => {
      setReminderSending(false);
      showToast(error.message || String(error));
    });
  }

  function setReminderSending(isSending) {
    const sendButton = document.getElementById('confirmReminder');
    const cancelButton = document.getElementById('cancelReminder');
    const closeButton = document.getElementById('closeReminderModal');
    if (sendButton) {
      sendButton.disabled = isSending;
      sendButton.textContent = isSending ? '전송 중...' : '보내기';
    }
    if (cancelButton) cancelButton.disabled = isSending;
    if (closeButton) closeButton.disabled = isSending;
    const toggleAllButton = document.getElementById('toggleAllReminders');
    if (toggleAllButton) toggleAllButton.disabled = isSending;
    document.querySelectorAll('#reminderMemberList button').forEach((button) => {
      button.disabled = isSending;
    });
  }

  function updateAfterAction(data) {
    state.data = data;
    cacheAdminData();
    renderAdmin();
    showToast('반영되었습니다.');
  }

  function statusBadge(status) {
    const submitted = status === 'Submitted';
    return `<span class="status-badge ${submitted ? 'status-submitted' : 'status-missing'}">${submitted ? '제출 완료' : '미제출'}</span>`;
  }

  function activeBadge(active) {
    const isActive = active === 'Yes';
    return `<span class="status-badge ${isActive ? 'status-active-outline' : 'status-inactive'}">${isActive ? '활성' : '비활성'}</span>`;
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 3200);
  }

  function formatMonth(month) {
    if (!month) return '-';
    const parts = month.split('-');
    return `${parts[0]}년 ${Number(parts[1])}월`;
  }

  function formatMonthRange(month) {
    if (!month) return '-';
    const currentParts = month.split('-');
    if (currentParts.length < 2) return '-';
    const year = Number(currentParts[0]);
    const monthNumber = Number(currentParts[1]);
    const nextMonth = monthNumber === 12 ? 1 : monthNumber + 1;
    return `${year}년 ${monthNumber}월 - ${nextMonth}월`;
  }

  function formatShortDate(date) {
    if (!date) return '-';
    return `${Number(date.slice(5, 7))}/${Number(date.slice(8, 10))}`;
  }

  function formatDateListShort(value) {
    const dates = String(value || '').split(',').map((item) => item.trim()).filter(Boolean);
    return dates.length ? dates.map(formatShortDate).join(', ') : '-';
  }

  function formatDateOnly(value) {
    return value ? String(value).slice(0, 10) : '';
  }

  function parseAvailableSundays(value) {
    return new Set(String(value || '').split(',').map((item) => item.trim()).filter(Boolean));
  }

  function splitNames(value) {
    return String(value || '').split(',').map((item) => item.trim()).filter(Boolean);
  }

  function splitPositions(value) {
    return splitNames(value)
      .filter((position, index, positions) => positions.indexOf(position) === index);
  }

  function hasPosition(value, position) {
    return splitPositions(value).includes(position);
  }

  function normalizeText(value) {
    return String(value || '').trim().toLowerCase();
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/`/g, '&#096;');
  }
</script>
